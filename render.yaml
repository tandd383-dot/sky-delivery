services:
  - type: web
    name: friend-order-app
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATA_DIR
        value: /opt/render/project/src/data
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
