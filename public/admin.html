<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管理后台 - 小赖菜单</title>
    <link rel="stylesheet" href="user.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div id="admin-login-page">
        <div class="login-bg">
            <div class="login-decor">
                <div class="login-circle login-circle-1"></div>
                <div class="login-circle login-circle-2"></div>
                <div class="login-circle login-circle-3"></div>
            </div>
            <div class="login-content">
                <div class="login-logo">
                    <div class="logo-icon-wrap">
                        <span class="logo-icon">👨‍🍳</span>
                    </div>
                    <h1>管理后台</h1>
                    <p>小赖菜单 · 管理员登录</p>
                </div>
                <div class="login-box">
                    <div class="login-input-wrap">
                        <span class="login-input-icon">👤</span>
                        <input type="text" id="admin-login-name" placeholder="管理员账号" value="admin">
                    </div>
                    <div class="login-input-wrap">
                        <span class="login-input-icon">🔒</span>
                        <input type="password" id="admin-login-password" placeholder="管理员密码">
                    </div>
                    <button onclick="adminLogin()" class="login-btn">登录</button>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-main" class="hidden">
        <div class="admin-header">
            <div class="admin-header-inner">
                <span class="admin-header-icon">🍜</span>
                <span class="admin-header-title">小赖菜单 · 管理后台</span>
            </div>
            <div class="admin-header-right">
                <div id="new-order-badge" class="new-order-badge hidden" onclick="showTab('orders', document.querySelector('[data-tab=orders]'))">
                    <span id="new-order-count">0</span> 新订单
                </div>
                <span class="admin-header-logout" onclick="adminLogout()">退出</span>
            </div>
        </div>

        <div class="admin-tabs">
            <div class="admin-tab active" data-tab="menu" onclick="showTab('menu', this)">
                <span class="admin-tab-icon">📋</span>
                <span>菜单</span>
            </div>
            <div class="admin-tab" data-tab="orders" onclick="showTab('orders', this)">
                <span class="admin-tab-icon">📦</span>
                <span>订单</span>
            </div>
            <div class="admin-tab" data-tab="users" onclick="showTab('users', this)">
                <span class="admin-tab-icon">👥</span>
                <span>用户</span>
            </div>
            <div class="admin-tab" data-tab="stats" onclick="showTab('stats', this)">
                <span class="admin-tab-icon">📊</span>
                <span>统计</span>
            </div>
            <div class="admin-tab" data-tab="share" onclick="showTab('share', this)">
                <span class="admin-tab-icon">🔗</span>
                <span>分享</span>
            </div>
        </div>

        <div id="menu-tab" class="admin-tab-content active">
            <div class="admin-card">
                <div class="admin-card-title">添加菜品</div>
                <form id="add-menu-form" class="admin-form">
                    <input type="text" id="menu-name" placeholder="菜品名称" required>
                    <textarea id="menu-description" placeholder="菜品描述（选填）" rows="2"></textarea>
                    <div class="admin-form-row">
                        <input type="number" id="menu-price" placeholder="积分价格" required min="1" class="admin-form-half">
                        <select id="menu-category" class="admin-form-half admin-select">
                            <option value="主食">主食</option>
                            <option value="炒菜">炒菜</option>
                            <option value="凉菜">凉菜</option>
                            <option value="汤类">汤类</option>
                            <option value="小吃">小吃</option>
                            <option value="饮品">饮品</option>
                            <option value="甜点">甜点</option>
                        </select>
                    </div>
                    <div class="admin-form-row">
                        <select id="menu-spice" class="admin-form-half admin-select">
                            <option value="可选">辣度：可选</option>
                            <option value="不可选">辣度：不可选</option>
                            <option value="微辣">辣度：微辣</option>
                            <option value="中辣">辣度：中辣</option>
                            <option value="特辣">辣度：特辣</option>
                        </select>
                        <label class="admin-checkbox-label admin-form-half">
                            <input type="checkbox" id="menu-recommended"> 设为推荐
                        </label>
                    </div>
                    <div class="admin-form-row">
                        <input type="text" id="menu-taste-options" placeholder="口味选项（逗号分隔，如：少盐,少油,加蛋）" class="admin-form-full">
                    </div>
                    <div class="upload-area" onclick="document.getElementById('menu-image').click()">
                        <input type="file" id="menu-image" accept="image/*" hidden>
                        <span id="upload-text">📷 点击上传图片</span>
                        <img id="upload-preview" class="upload-preview hidden" alt="">
                    </div>
                    <button type="submit" class="mt-btn mt-btn-primary mt-btn-block">添加菜品</button>
                </form>
            </div>
            <div class="admin-card">
                <div class="admin-card-title">当前菜单</div>
                <div id="menu-list" class="admin-menu-list"></div>
            </div>
        </div>

        <div id="orders-tab" class="admin-tab-content">
            <div class="admin-card">
                <div class="admin-card-title">实时订单</div>
                <div id="orders-list" class="admin-orders-list"></div>
            </div>
        </div>

        <div id="users-tab" class="admin-tab-content">
            <div class="admin-card">
                <div class="admin-card-title">用户管理</div>
                <div id="users-list" class="admin-users-list"></div>
            </div>
        </div>

        <div id="stats-tab" class="admin-tab-content">
            <div class="admin-card">
                <div class="admin-card-title">数据概览</div>
                <div class="stats-grid">
                    <div class="stat-card stat-orders"><div class="stat-num" id="stat-total-orders">0</div><div class="stat-label">总订单</div></div>
                    <div class="stat-card stat-today"><div class="stat-num" id="stat-today-orders">0</div><div class="stat-label">今日订单</div></div>
                    <div class="stat-card stat-users"><div class="stat-num" id="stat-total-users">0</div><div class="stat-label">注册用户</div></div>
                    <div class="stat-card stat-sales"><div class="stat-num" id="stat-total-sales">0</div><div class="stat-label">总消费积分</div></div>
                </div>
            </div>
            <div class="admin-card">
                <div class="admin-card-title">热门菜品 TOP5</div>
                <div id="top-items" class="top-items-list"></div>
            </div>
        </div>

        <div id="share-tab" class="admin-tab-content">
            <div class="admin-card">
                <div class="admin-card-title">分享给好友</div>
                <div class="share-box">
                    <p class="share-desc">将以下链接发送给好友，好友打开即可点餐：</p>
                    <div class="share-link-box">
                        <input type="text" id="share-url" readonly class="share-input">
                        <button onclick="copyShareLink()" class="mt-btn mt-btn-primary mt-btn-sm">复制</button>
                    </div>
                    <div class="share-qr"><div id="qr-code"></div><p class="share-qr-hint">扫码分享给好友</p></div>
                    <div class="share-admin-link">
                        <p class="share-desc">管理员入口（仅自己使用）：</p>
                        <div class="share-link-box">
                            <input type="text" id="admin-url" readonly class="share-input">
                            <button onclick="copyAdminLink()" class="mt-btn mt-btn-sm mt-btn-dark">复制</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="edit-modal" class="mt-mask hidden">
        <div class="edit-modal-content">
            <div class="edit-modal-header">
                <span>编辑菜品</span>
                <span class="edit-modal-close" onclick="closeModal()">&times;</span>
            </div>
            <form id="edit-menu-form" class="admin-form">
                <input type="hidden" id="edit-menu-id">
                <input type="text" id="edit-menu-name" placeholder="菜品名称" required>
                <textarea id="edit-menu-description" placeholder="菜品描述" rows="2"></textarea>
                <div class="admin-form-row">
                    <input type="number" id="edit-menu-price" placeholder="积分价格" required min="1" class="admin-form-half">
                    <select id="edit-menu-category" class="admin-form-half admin-select">
                        <option value="主食">主食</option><option value="炒菜">炒菜</option><option value="凉菜">凉菜</option>
                        <option value="汤类">汤类</option><option value="小吃">小吃</option><option value="饮品">饮品</option><option value="甜点">甜点</option>
                    </select>
                </div>
                <div class="admin-form-row">
                    <select id="edit-menu-spice" class="admin-form-half admin-select">
                        <option value="可选">辣度：可选</option><option value="不可选">辣度：不可选</option>
                        <option value="微辣">辣度：微辣</option><option value="中辣">辣度：中辣</option><option value="特辣">辣度：特辣</option>
                    </select>
                    <label class="admin-checkbox-label admin-form-half"><input type="checkbox" id="edit-menu-recommended"> 设为推荐</label>
                </div>
                <div class="admin-form-row"><input type="text" id="edit-menu-taste-options" placeholder="口味选项（逗号分隔）" class="admin-form-full"></div>
                <label class="admin-checkbox-label"><input type="checkbox" id="edit-menu-available"> 上架中</label>
                <input type="hidden" id="edit-existing-image">
                <div class="upload-area" onclick="document.getElementById('edit-menu-image').click()">
                    <input type="file" id="edit-menu-image" accept="image/*" hidden>
                    <span id="edit-upload-text">📷 点击更换图片</span>
                    <img id="edit-upload-preview" class="upload-preview hidden" alt="">
                </div>
                <button type="submit" class="mt-btn mt-btn-primary mt-btn-block">保存修改</button>
            </form>
        </div>
    </div>

    <div id="password-modal" class="mt-mask hidden">
        <div class="edit-modal-content">
            <div class="edit-modal-header">
                <span>修改管理员密码</span>
                <span class="edit-modal-close" onclick="closePasswordModal()">&times;</span>
            </div>
            <div class="admin-form">
                <div class="login-input-wrap">
                    <span class="login-input-icon">🔒</span>
                    <input type="password" id="admin-old-password" placeholder="当前密码">
                </div>
                <div class="login-input-wrap">
                    <span class="login-input-icon">🔑</span>
                    <input type="password" id="admin-new-password" placeholder="新密码（至少4位）">
                </div>
                <div class="login-input-wrap">
                    <span class="login-input-icon">🔑</span>
                    <input type="password" id="admin-new-password2" placeholder="确认新密码">
                </div>
                <button class="mt-btn mt-btn-primary mt-btn-block" onclick="adminChangePassword()">确认修改</button>
            </div>
        </div>
    </div>

    <div id="toast" class="mt-toast hidden"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="admin.js"></script>
</body>
</html>
