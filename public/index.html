<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小赖菜单</title>
    <link rel="stylesheet" href="user.css">
</head>
<body>
    <div id="app">
        <div id="login-page" class="page active">
            <div class="login-bg">
                <div class="login-decor">
                    <div class="login-circle login-circle-1"></div>
                    <div class="login-circle login-circle-2"></div>
                    <div class="login-circle login-circle-3"></div>
                </div>
                <div class="login-content">
                    <div class="login-logo">
                        <div class="logo-icon-wrap">
                            <span class="logo-icon">🍜</span>
                        </div>
                        <h1>小赖菜单</h1>
                        <p>用积分，享美食，点你想吃</p>
                    </div>
                    <div class="login-box">
                        <div id="login-form">
                            <div class="login-input-wrap">
                                <span class="login-input-icon">👤</span>
                                <input type="text" id="login-name" placeholder="请输入用户名" maxlength="12">
                            </div>
                            <div class="login-input-wrap">
                                <span class="login-input-icon">🔒</span>
                                <input type="password" id="login-password" placeholder="请输入密码">
                            </div>
                            <button onclick="login()" class="login-btn">登录</button>
                            <div class="login-switch">
                                还没有账号？<span class="login-switch-link" onclick="showRegisterForm()">立即注册</span>
                            </div>
                        </div>
                        <div id="register-form" class="hidden">
                            <div class="login-input-wrap">
                                <span class="login-input-icon">👤</span>
                                <input type="text" id="reg-name" placeholder="设置用户名（2-12个字符）" maxlength="12">
                            </div>
                            <div class="login-input-wrap">
                                <span class="login-input-icon">🔒</span>
                                <input type="password" id="reg-password" placeholder="设置密码（至少4位）">
                            </div>
                            <div class="login-input-wrap">
                                <span class="login-input-icon">🔒</span>
                                <input type="password" id="reg-password2" placeholder="再次确认密码">
                            </div>
                            <button onclick="register()" class="login-btn">注册</button>
                            <div class="login-switch">
                                已有账号？<span class="login-switch-link" onclick="showLoginForm()">去登录</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="menu-page" class="page">
            <div class="mt-header">
                <div class="mt-header-left">
                    <span class="mt-header-title">小赖菜单</span>
                </div>
                <div class="mt-header-right">
                    <div class="mt-header-user" onclick="showProfilePanel()">
                        <span class="user-avatar" id="user-avatar-text">我</span>
                    </div>
                </div>
            </div>

            <div class="mt-points-bar">
                <div class="points-info">
                    <span class="points-label">我的积分</span>
                    <span class="points-value" id="user-points">0</span>
                </div>
                <div class="points-user" id="user-name-display">未登录</div>
            </div>

            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" placeholder="搜索菜品..." oninput="filterMenu()">
            </div>

            <div class="category-tabs" id="category-tabs">
                <div class="cat-tab active" data-cat="all" onclick="selectCategory('all', this)">全部</div>
            </div>

            <div class="mt-menu-layout">
                <div id="menu-list" class="mt-dish-list"></div>
            </div>

            <div id="cart-float" class="mt-cart-float hidden" onclick="toggleCartPanel()">
                <div class="cart-float-icon">
                    <span class="cart-badge" id="cart-badge">0</span>
                    🛒
                </div>
                <div class="cart-float-info">
                    <span class="cart-float-total"><span id="cart-total">0</span>积分</span>
                </div>
                <div class="cart-float-btn" onclick="event.stopPropagation(); openRemarkPanel()">去下单</div>
            </div>

            <div id="cart-panel-mask" class="mt-mask hidden" onclick="toggleCartPanel()"></div>
            <div id="cart-panel" class="mt-cart-panel hidden">
                <div class="cart-panel-header">
                    <span>已选商品</span>
                    <span class="cart-clear" onclick="clearCart()">清空</span>
                </div>
                <div id="cart-items" class="cart-panel-list"></div>
            </div>

            <div id="remark-mask" class="mt-mask hidden" onclick="closeRemarkPanel()"></div>
            <div id="remark-panel" class="remark-panel hidden">
                <div class="remark-header">
                    <span>订单备注</span>
                    <span class="remark-close" onclick="closeRemarkPanel()">&times;</span>
                </div>
                <textarea id="order-remark" placeholder="如：不要香菜、少放盐、加辣..."></textarea>
                <div class="remark-footer">
                    <div class="remark-total">合计：<span id="remark-total-points">0</span>积分</div>
                    <button class="mt-btn mt-btn-primary" onclick="submitOrder()">确认下单</button>
                </div>
            </div>

            <div id="taste-mask" class="mt-mask hidden" onclick="closeTastePanel()"></div>
            <div id="taste-panel" class="taste-panel hidden">
                <div class="taste-header">
                    <span id="taste-dish-name">菜品名称</span>
                    <span class="taste-close" onclick="closeTastePanel()">&times;</span>
                </div>
                <div id="taste-spice-section" class="taste-section">
                    <div class="taste-section-title">辣度</div>
                    <div class="taste-options" id="spice-options"></div>
                </div>
                <div id="taste-custom-section" class="taste-section">
                    <div class="taste-section-title">口味</div>
                    <div class="taste-options" id="custom-taste-options"></div>
                </div>
                <button class="mt-btn mt-btn-primary mt-btn-block" onclick="confirmTaste()">确认</button>
            </div>

            <div id="profile-mask" class="mt-mask hidden" onclick="closeProfilePanel()"></div>
            <div id="profile-panel" class="profile-panel hidden">
                <div class="profile-header">
                    <div class="profile-avatar" id="profile-avatar">我</div>
                    <div class="profile-name" id="profile-name">用户名</div>
                    <div class="profile-points">积分：<span id="profile-points-value">0</span></div>
                </div>
                <div class="profile-menu">
                    <div class="profile-menu-item" onclick="showChangePassword()">
                        <span class="profile-menu-icon">🔑</span>
                        <span>修改密码</span>
                        <span class="profile-menu-arrow">›</span>
                    </div>
                    <div class="profile-menu-item" onclick="logout()">
                        <span class="profile-menu-icon">🚪</span>
                        <span>退出登录</span>
                        <span class="profile-menu-arrow">›</span>
                    </div>
                </div>
            </div>

            <div id="password-mask" class="mt-mask hidden" onclick="closePasswordPanel()"></div>
            <div id="password-panel" class="password-panel hidden">
                <div class="password-header">
                    <span>修改密码</span>
                    <span class="password-close" onclick="closePasswordPanel()">&times;</span>
                </div>
                <div class="password-form">
                    <div class="login-input-wrap">
                        <span class="login-input-icon">🔒</span>
                        <input type="password" id="old-password" placeholder="旧密码">
                    </div>
                    <div class="login-input-wrap">
                        <span class="login-input-icon">🔑</span>
                        <input type="password" id="new-password" placeholder="新密码（至少4位）">
                    </div>
                    <div class="login-input-wrap">
                        <span class="login-input-icon">🔑</span>
                        <input type="password" id="new-password2" placeholder="确认新密码">
                    </div>
                    <button class="mt-btn mt-btn-primary mt-btn-block" onclick="changePassword()">确认修改</button>
                </div>
            </div>

            <div class="mt-bottom-nav">
                <div class="nav-item active" onclick="showMenu()">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-text">点餐</span>
                </div>
                <div class="nav-item" onclick="showOrders()">
                    <span class="nav-icon">📋</span>
                    <span class="nav-text">订单</span>
                </div>
            </div>
        </div>

        <div id="orders-page" class="page">
            <div class="mt-header">
                <div class="mt-header-left">
                    <div class="mt-header-back" onclick="showMenu()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                    </div>
                    <span class="mt-header-title">我的订单</span>
                </div>
                <div class="mt-header-right">
                    <div class="mt-header-user" onclick="showMenu()">
                        <span class="user-avatar" id="user-avatar-text-2">我</span>
                    </div>
                </div>
            </div>
            <div class="mt-order-tabs">
                <div class="order-tab active" data-status="all" onclick="filterOrders('all', this)">全部</div>
                <div class="order-tab" data-status="pending" onclick="filterOrders('pending', this)">待处理</div>
                <div class="order-tab" data-status="completed" onclick="filterOrders('completed', this)">已完成</div>
            </div>
            <div id="my-orders" class="mt-orders-list"></div>
            <div class="mt-bottom-nav">
                <div class="nav-item" onclick="showMenu()">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-text">点餐</span>
                </div>
                <div class="nav-item active" onclick="showOrders()">
                    <span class="nav-icon">📋</span>
                    <span class="nav-text">订单</span>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="mt-toast hidden"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="user.js"></script>
</body>
</html>
