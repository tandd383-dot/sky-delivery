services:
  - type: web
    name: friend-order-app
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: friend_order
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
